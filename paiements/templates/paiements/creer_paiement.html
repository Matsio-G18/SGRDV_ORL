{% extends "base.html" %}
{% load static %}

{% block title %}Enregistrer un Reçu - BERNADETTE{% endblock %}

{% block content %}
<main class="container" style="margin-top: 120px; margin-bottom: 50px;" data-aos="fade-up">
    <div class="mb-4">
        <a href="{% url 'paiements:list' %}" class="text-decoration-none text-muted small">
            <i class="fas fa-arrow-left me-1"></i> Annuler
        </a>
        <h1 class="fw-bold h2 mt-2" style="color: #0f766e;">
            <i class="fa-solid fa-file-invoice-dollar me-2" style="color: #14b8a6;"></i>Nouvelle Écriture Comptable
        </h1>
        <p class="text-muted m-0">Enregistrez un versement ou éditez une note de frais pour un acte médical.</p>
    </div>

    <div class="row">
        <div class="col-12 col-lg-8 mx-auto">
            <div class="card border-0 shadow-sm rounded-3">
                <div class="card-body p-4 p-md-5">
                    <form method="POST" action="">
                        {% csrf_token %}
                        
                        <div class="row g-3">
                            <!-- Sélection du Patient -->
                            <div class="col-md-12">
                                <label class="form-label fw-semibold text-secondary small">Sélectionner le Patient</label>
                                <select name="patient" class="form-select" required>
                                    <option value="">-- Choisir un patient dans la base --</option>
                                    {% for patient in patients %}
                                        <option value="{{ patient.id }}">{{ patient.nom }} {{ patient.prenom }} (#{{ patient.id }})</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <!-- Montant -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-secondary small">Montant (FCFA)</label>
                                <input type="number" step="0.01" name="montant" class="form-control" placeholder="Ex: 25000" required>
                            </div>

                            <!-- Mode de Paiement -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-secondary small">Mode de règlement</label>
                                <select name="mode_paiement" class="form-select">
                                    <option value="especes">Espèces</option>
                                    <option value="mobile_money">Mobile Money (Airtel/MTN)</option>
                                    <option value="carte">Carte Bancaire</option>
                                </select>
                            </div>

                            <!-- Statut -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-secondary small">Statut initial</label>
                                <select name="statut" class="form-select">
                                    <option value="paye">Payé (Émettre un reçu immédiat)</option>
                                    <option value="en_attente">En attente de paiement</option>
                                </select>
                            </div>

                            <!-- Description -->
                            <div class="col-md-12">
                                <label class="form-label fw-semibold text-secondary small">Libellé / Désignation de la consultation</label>
                                <input type="text" name="description" class="form-control" placeholder="Ex: Bilan auditif complet + audiométrie" required>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-2 border-top pt-4 mt-4">
                            <button type="submit" class="btn text-white px-5 rounded-pill fw-medium" style="background-color: #0f766e; border: none;">
                                Enregistrer la transaction
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
{% endblock %}
