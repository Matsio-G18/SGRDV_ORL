{% extends "base.html" %}
{% load static %}

{% block title %}Modifier Écriture - BERNADETTE{% endblock %}

{% block content %}
<main class="container" style="margin-top: 120px; margin-bottom: 50px;" data-aos="fade-up">
    <div class="mb-4">
        <a href="{% url 'paiements:list' %}" class="text-decoration-none text-muted small">
            <i class="fas fa-arrow-left me-1"></i> Annuler
        </a>
        <h1 class="fw-bold h2 mt-2" style="color: #0f766e;">
            <i class="fa-solid fa-file-pen me-2" style="color: #14b8a6;"></i>Rectifier la Facture #FAC-{{ paiement.id }}
        </h1>
    </div>

    <div class="row">
        <div class="col-12 col-lg-8 mx-auto">
            <div class="card border-0 shadow-sm rounded-3">
                <div class="card-body p-4 p-md-5">
                    <form method="POST" action="">
                        {% csrf_token %}
                        
                        <div class="bg-light p-3 rounded mb-4 border-start border-3" style="border-color: #14b8a6 !important;">
                            <span class="text-muted small d-block">Patient associé :</span>
                            <strong class="text-dark">{{ paiement.patient }}</strong>
                        </div>

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-secondary small">Montant Rectifié (FCFA)</label>
                                <input type="number" step="0.01" name="montant" value="{{ paiement.montant }}" class="form-control" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-secondary small">Mode de règlement</label>
                                <select name="mode_paiement" class="form-select">
                                    <option value="especes" {% if paiement.mode_paiement == 'especes' %}selected{% endif %}>Espèces</option>
                                    <option value="mobile_money" {% if paiement.mode_paiement == 'mobile_money' %}selected{% endif %}>Mobile Money (Airtel/MTN)</option>
                                    <option value="carte" {% if paiement.mode_paiement == 'carte' %}selected{% endif %}>Carte Bancaire</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-secondary small">État du règlement</label>
                                <select name="statut" class="form-select">
                                    <option value="paye" {% if paiement.statut == 'paye' %}selected{% endif %}>Payé</option>
                                    <option value="en_attente" {% if paiement.statut == 'en_attente' %}selected{% endif %}>En attente</option>
                                </select>
                            </div>

                            <div class="col-md-12">
                                <label class="form-label fw-semibold text-secondary small">Désignation de l'acte</label>
                                <input type="text" name="description" value="{{ paiement.description }}" class="form-control" required>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-2 border-top pt-4 mt-4">
                            <button type="submit" class="btn text-white px-5 rounded-pill fw-medium" style="background-color: #0f766e; border: none;">
                                Sauvegarder les rectifications
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
{% endblock %}
