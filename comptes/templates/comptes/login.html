{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - BERNADETTE SGRDV ORL</title>
    
    <!-- Bootstrap CSS local -->
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">

    <!-- FontAwesome pour les icônes (Version stable via CDN public et sécurisé) -->
    <link rel="stylesheet" href="https://cloudflare.com">

    <!-- Fonts Google avec paramètre d'affichage immédiat (display=swap) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Styles Personnalisés : Conversion au Vert Médical -->
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #14b8a6 0%, #0f766e 100%); 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .login-card {
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            max-width: 450px;
            width: 100%;
            padding: 2.5rem;
        }
        .brand-title {
            color: #0f766e;
            font-weight: 700;
        }
        .btn-medical {
            background-color: #0f766e;
            color: white;
            border: none;
            transition: all 0.3s ease;
        }
        .btn-medical:hover {
            background-color: #115e59;
            color: white;
            transform: translateY(-2px);
        }
        .form-control:focus {
            border-color: #14b8a6;
            box-shadow: 0 0 0 0.25rem rgba(20, 184, 166, 0.25);
        }
        .alert-medical {
            background-color: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }
    </style>
</head>
<body>

<div class="login-card text-center">
    <!-- En-tête avec Icône Stéthoscope ORL -->
    <div class="mb-4">
        <h2 class="brand-title mb-1"><i class="fa-solid fa-stethoscope me-2"></i>SGRDV-ORL</h2>
        <p class="text-muted small">Système de gestion de rendez-vous Orl</p>
    </div>

    <!-- Affichage des messages d'erreur Django -->
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-medical small text-start py-2" role="alert">
                <i class="fas fa-exclamation-circle me-2"></i>{{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <!-- Formulaire lié à login_view -->
    <form action="{% url 'comptes:login' %}" method="POST">
        {% csrf_token %}
        
        <div class="form-floating mb-3 text-start">
            <input type="text" name="username" class="form-control" id="id_username" placeholder="Identifiant" required>
            <label for="id_username" class="text-secondary"><i class="fas fa-user me-2"></i>Identifiant</label>
        </div>
        
        <div class="form-floating mb-4 text-start">
            <input type="password" name="password" class="form-control" id="id_password" placeholder="Mot de passe" required>
            <label for="id_password" class="text-secondary"><i class="fas fa-lock me-2"></i>Mot de passe</label>
        </div>

        <button type="submit" class="btn btn-medical w-100 py-2.5 fw-bold rounded-pill mb-2">
            <i class="fas fa-sign-in-alt me-2"></i>Se connecter
        </button>
    </form>
    <div class="mt-3 small">
        <span class="text-muted">Nouveau patient ?</span> 
        <a href="{% url 'comptes:register' %}" class="text-decoration-none fw-bold" style="color: #7c3aed;">Créer un compte</a>
    </div>
    <div class="mt-3 small">
        <a href="/" class="text-decoration-none text-muted"><i class="fas fa-arrow-left me-1"></i> Retour à l'accueil</a>
    </div>
</div>

<!-- Bootstrap 5 JavaScript Local (Utilise le fichier déjà présent sur votre Render) -->
<script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
