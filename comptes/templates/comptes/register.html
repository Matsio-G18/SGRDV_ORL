{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription Patient - BERNADETTE SGRDV ORL</title>
    
    <!-- Bootstrap CSS local de votre projet PrimeDental -->
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">

    <!-- Icon Font Stylesheet -->
    <link href="https://cloudflare.com" rel="stylesheet">
    <link href="https://jsdelivr.net" rel="stylesheet">

    <!-- Fonts -->
    <link rel="preconnect" href="https://googleapis.com" />
    <link rel="preconnect" href="https://gstatic.com" crossorigin />
    <link href="https://googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />

    <!-- Styles Personnalisés : Cohérence Vert Médical -->
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #14b8a6 0%, #0f766e 100%); 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .register-card {
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            max-width: 500px;
            width: 100%;
            padding: 2.5rem;
        }
        .brand-title {
            color: #0f766e;
            font-weight: 700;
        }
        .btn-medical {
            background-color: #0f766e;
            color: white;
            border: none;
            transition: all 0.3s ease;
        }
        .btn-medical:hover {
            background-color: #115e59;
            color: white;
            transform: translateY(-2px);
        }
        /* Style automatique pour les champs générés par Django */
        .register-card input[type="text"],
        .register-card input[type="password"],
        .register-card input[type="email"],
        .register-card input[type="tel"] {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #ced4da;
            border-radius: 8px;
            margin-bottom: 1rem;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .register-card input:focus {
            outline: none;
            border-color: #14b8a6;
            box-shadow: 0 0 0 0.25rem rgba(20, 184, 166, 0.25);
        }
        .register-card label {
            font-weight: 500;
            color: #495057;
            margin-bottom: 0.25rem;
            display: block;
            text-align: left;
            font-size: 0.9rem;
        }
        .helptext {
            display: block;
            font-size: 0.75rem;
            color: #6c757d;
            text-align: left;
            margin-top: -0.75rem;
            margin-bottom: 1rem;
        }
        .errorlist {
            list-style: none;
            padding-left: 0;
            color: #dc3545;
            font-size: 0.85rem;
            text-align: left;
            margin-bottom: 1rem;
        }
        .alert-medical {
            background-color: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }
    </style>
</head>
<body>

<div class="register-card text-center">
    <!-- En-tête -->
    <div class="mb-4">
        <h2 class="brand-title mb-1"><i class="fa-solid fa-stethoscope me-2"></i> SGRDV ORL BERNADETTE</h2>
        <p class="text-muted small">Création d'un espace Patient ORL</p>
    </div>

    <!-- Affichage des messages d'erreur système de Django -->
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-medical small text-start py-2" role="alert">
                <i class="fas fa-exclamation-circle me-2"></i>{{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <!-- Formulaire d'inscription lié à votre vue register -->
    <form action="{% url 'comptes:register' %}" method="POST" autocomplete="off">
        {% csrf_token %}
        
        <!-- Inclusion propre du formulaire UserCreationForm fourni par la vue -->
        <div class="mb-3">
            {{ form }}
        </div>

        <button type="submit" class="btn btn-medical w-100 py-2.5 fw-bold rounded-pill mt-2 mb-3">
            <i class="fas fa-user-plus me-2"></i>Créer mon compte
        </button>
    </form>

    <div class="mt-2 small">
        <span class="text-muted">Déjà inscrit ?</span> 
        <a href="{% url 'comptes:login' %}" class="text-decoration-none fw-bold" style="color: #0f766e;">Se connecter</a>
    </div>
    
    <div class="mt-3 border-top pt-2">
        <a href="/" class="text-decoration-none text-muted small"><i class="fas fa-arrow-left me-1"></i> Retour à l'accueil</a>
    </div>
</div>

<script src="https://jsdelivr.net"></script>
</body>
</html>
